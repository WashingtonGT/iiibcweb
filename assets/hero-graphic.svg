<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none" aria-hidden="true">
  <defs>
    <!-- Dot grid pattern representing "noise" -->
    <pattern id="dot-grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="white" opacity="0.07"/>
    </pattern>
    <!-- Subtle horizontal line pattern -->
    <pattern id="h-lines" x="0" y="0" width="1" height="24" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Dot grid background — full field of "noise" -->
  <rect width="1200" height="500" fill="url(#dot-grid)"/>

  <!-- Right-side structural bars — the "signal" emerging from noise -->
  <!-- Large three-bar motif, right side, very low opacity -->
  <rect x="920" y="60"  width="40" height="380" rx="4" fill="#1D4ED8" opacity="0.08"/>
  <rect x="980" y="30"  width="40" height="440" rx="4" fill="#1D4ED8" opacity="0.12"/>
  <rect x="1040" y="60" width="40" height="380" rx="4" fill="#1D4ED8" opacity="0.08"/>

  <!-- Data bar chart elements — mid-right, representing "framework" structure -->
  <rect x="680" y="340" width="16" height="120" rx="3" fill="#1D4ED8" opacity="0.18"/>
  <rect x="706" y="290" width="16" height="170" rx="3" fill="#1D4ED8" opacity="0.22"/>
  <rect x="732" y="320" width="16" height="140" rx="3" fill="#1D4ED8" opacity="0.16"/>
  <rect x="758" y="270" width="16" height="190" rx="3" fill="#0EA5E9" opacity="0.28"/>
  <rect x="784" y="310" width="16" height="150" rx="3" fill="#1D4ED8" opacity="0.18"/>
  <rect x="810" y="350" width="16" height="110" rx="3" fill="#1D4ED8" opacity="0.14"/>
  <rect x="836" y="295" width="16" height="165" rx="3" fill="#0EA5E9" opacity="0.20"/>
  <rect x="862" y="330" width="16" height="130" rx="3" fill="#1D4ED8" opacity="0.16"/>

  <!-- Signal highlight line — horizontal axis of the bar chart -->
  <line x1="660" y1="460" x2="890" y2="460" stroke="#0EA5E9" stroke-width="1.5" opacity="0.3"/>

  <!-- Three-bar logo mark, large, center-right, very subtle -->
  <rect x="500" y="140" width="18" height="220" rx="3" fill="white" opacity="0.03"/>
  <rect x="532" y="100" width="18" height="300" rx="3" fill="white" opacity="0.05"/>
  <rect x="564" y="140" width="18" height="220" rx="3" fill="white" opacity="0.03"/>

  <!-- Teal "signal" accent dots — scattered, highlighting specific data points -->
  <circle cx="758" cy="265" r="4" fill="#0EA5E9" opacity="0.6"/>
  <circle cx="836" cy="290" r="4" fill="#0EA5E9" opacity="0.5"/>
  <circle cx="706" cy="285" r="3" fill="#F59E0B" opacity="0.5"/>

  <!-- Subtle horizontal grid lines over data section -->
  <line x1="660" y1="380" x2="890" y2="380" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="660" y1="340" x2="890" y2="340" stroke="white" stroke-width="0.5" opacity="0.06"/>
  <line x1="660" y1="300" x2="890" y2="300" stroke="white" stroke-width="0.5" opacity="0.06"/>

  <!-- Left-side fade: very subtle diagonal lines suggesting "noise" fading into structure -->
  <line x1="50"  y1="100" x2="250" y2="400" stroke="white" stroke-width="0.5" opacity="0.04"/>
  <line x1="120" y1="80"  x2="320" y2="420" stroke="white" stroke-width="0.5" opacity="0.03"/>
  <line x1="200" y1="60"  x2="400" y2="440" stroke="white" stroke-width="0.5" opacity="0.03"/>

  <!-- Teal accent: thin line connecting signal points — the "insight" line -->
  <polyline
    points="680,345 706,285 758,265 810,308 836,290 890,325"
    stroke="#0EA5E9"
    stroke-width="1.5"
    fill="none"
    opacity="0.35"
    stroke-linejoin="round"/>

  <!-- Right edge gradient fade (transparent to transparent — just structural) -->
  <rect x="1080" y="0" width="120" height="500" fill="#0F172A" opacity="0.5"/>
</svg>
