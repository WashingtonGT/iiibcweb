  <rect x="11" y="0"  width="7" height="42" rx="1.5" fill="#0EA5E9"/>
  <rect x="22" y="6"  width="7" height="36" rx="1.5" fill="#1D4ED8"/>
  <!-- BC wordmark -->
  <text x="44" y="33"
        font-family="'Sora', -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="800"
        font-size="32"
        fill="#0F172A"
        letter-spacing="2">BC</text>
</svg>
